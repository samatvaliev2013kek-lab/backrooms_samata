name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          
      - name: Download Godot 4.4.1
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          unzip Godot_v4.4.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.4.1-stable_linux.x86_64
          sudo mv Godot_v4.4.1-stable_linux.x86_64 /usr/local/bin/godot
          
      - name: Install Android Templates
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.4.1-stable
          unzip -j Godot_v4.4.1-stable_export_templates.tpz 'templates/*' -d ~/.local/share/godot/export_templates/4.4.1-stable
          
      - name: Export APK
        run: |
          mkdir -p build
          xvfb-run godot --headless --export-release "Android" "build/game.apk"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/*.apk
